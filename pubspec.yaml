name: fsn_dropwatch
description: 'Smart home water and power waste detection app.'
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  fl_chart: ^0.64.0
  flutter_bluetooth_serial: ^0.4.0
  firebase_core: ^2.24.0
  firebase_auth: ^4.10.0
  firebase_database: ^10.2.0
  firebase_storage: ^11.2.0
  flutter_local_notifications: ^14.1.1
  intl: ^0.19.0
  provider: ^6.1.0
  shared_preferences: ^2.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
  fonts:
    - family: Roboto
      fonts:
        - asset: assets/fonts/Roboto-Regular.ttf
        - asset: assets/fonts/Roboto-Bold.ttf
          weight: 700